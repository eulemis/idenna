<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sin conexión</title>
  <style>
    :root{--bg:#fff;--muted:#6b7280;--blue:#0671f3}
    html,body{height:100%;margin:0}
    body{display:flex;align-items:center;justify-content:center;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial; background:var(--bg);color:#111}
    .card{text-align:center;padding:40px}
    .logo{width:96px;height:96px;border-radius:50%;background:linear-gradient(180deg,#0ea5e9,#0369a1);display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:28px}
    .muted{color:var(--muted);margin-top:18px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">TM</div>
    <h2 style="margin:22px 0 8px">No tienes conexión</h2>
    <p class="muted">Verifica tu conexión a internet. La aplicación cargará en modo offline si los recursos están cacheados.</p>
  </div>
</body>
</html>
